<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Unic Elevators</title>
<!-- Fonts: load from Google if online, fallback to system fonts if offline (ACode/local) -->
<link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" media="print" onload="this.media='all'" />
<style>
  /* Safe font fallbacks so app looks good even without internet */
  @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap');
  body { font-family: 'DM Sans', 'Segoe UI', Arial, sans-serif; }
  h1,h2,h3,.topbar-title,.tid,.sn,
  [style*="Barlow Condensed"] { font-family: 'Barlow Condensed', 'Arial Narrow', Arial, sans-serif !important; }
</style>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --red: #8B0000; --red-light: #a50000;
  --navy: #1a1f2e;
  --amber: #f59e0b; --blue: #3b82f6; --green: #22c55e;
  --bg: #f4f4f4; --card: #ffffff;
  --text: #1a1f2e; --muted: #6b7280; --border: #e5e7eb;
}
html, body { height: 100%; background: var(--navy); font-family: 'DM Sans', 'Segoe UI', Arial, sans-serif; color: var(--text); }
#app { min-height: 100vh; display: flex; justify-content: center; align-items: flex-start; background: var(--navy); }
.screen { width: 100%; max-width: 480px; min-height: 100vh; background: var(--bg); }

/* Animations */
@keyframes fadeUp   { from{opacity:0;transform:translateY(18px)} to{opacity:1;transform:translateY(0)} }
@keyframes ping     { 0%,100%{transform:scale(1);opacity:1} 50%{transform:scale(1.7);opacity:.3} }
@keyframes checkPop { 0%{transform:scale(0) rotate(-20deg);opacity:0} 70%{transform:scale(1.15)} 100%{transform:scale(1);opacity:1} }
.fu  { animation: fadeUp .36s ease both; }
.fu2 { animation: fadeUp .36s .08s ease both; }
.fu3 { animation: fadeUp .36s .16s ease both; }
.pdot { animation: ping 1.8s infinite; }

/* Top bar */
.topbar { background: var(--navy); color: #fff; padding: 14px 18px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 200; box-shadow: 0 2px 8px rgba(0,0,0,.25); }
.topbar-title { font-family: 'Barlow Condensed',sans-serif; font-size: 20px; font-weight: 700; letter-spacing: 1px; }
.back-btn { background: rgba(255,255,255,.13); border: none; color: #fff; padding: 7px 14px; border-radius: 8px; cursor: pointer; font-size: 13px; font-family: 'DM Sans',sans-serif; }
.back-btn:active { opacity: .7; }
.logout-btn { background: var(--red); border: none; color: #fff; padding: 7px 14px; border-radius: 8px; cursor: pointer; font-size: 13px; font-family: 'DM Sans',sans-serif; }

/* Buttons */
.btn { width: 100%; padding: 16px; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; transition: all .17s; font-family: 'DM Sans',sans-serif; display: flex; align-items: center; justify-content: center; gap: 10px; }
.btn:active { transform: scale(.97); }
.btn-red    { background: var(--red);   color: #fff; }
.btn-red:hover { background: var(--red-light); }
.btn-navy   { background: var(--navy);  color: #fff; }
.btn-navy:hover { background: #252b3d; }
.btn-white  { background: #fff; color: var(--navy); border: 2px solid var(--border); }
.btn-white:hover { border-color: var(--navy); }
.btn-blue   { background: var(--blue);  color: #fff; }
.btn-green  { background: var(--green); color: #fff; }
.btn-outline{ background: transparent; color: var(--red); border: 2px solid var(--red); }

/* Inputs */
.ig { margin-bottom: 14px; }
.il { font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 6px; display: block; }
.if { width: 100%; padding: 13px 14px; border: 2px solid var(--border); border-radius: 10px; font-size: 15px; font-family: 'DM Sans',sans-serif; color: var(--text); background: #fff; transition: border-color .2s; }
.if:focus { outline: none; border-color: var(--red); }
textarea.if { resize: vertical; min-height: 80px; }
select.if { appearance: none; cursor: pointer; }

/* Cards */
.card { background: var(--card); border-radius: 14px; padding: 16px; margin-bottom: 12px; box-shadow: 0 1px 4px rgba(0,0,0,.07); border: 1px solid var(--border); }

/* Badges */
.badge { display: inline-flex; align-items: center; gap: 4px; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; }
.bp  { background: #fef3c7; color: #92400e; }
.bi  { background: #dbeafe; color: #1d4ed8; }
.bc  { background: #dcfce7; color: #166534; }
.bem { background: #fee2e2; color: #991b1b; }
.bmo { background: #f3e8ff; color: #6b21a8; }
.bin { background: #e0f2fe; color: #0369a1; }

/* Pills */
.pill-row { display: flex; gap: 8px; overflow-x: auto; padding: 0 18px 12px; -ms-overflow-style: none; scrollbar-width: none; }
.pill-row::-webkit-scrollbar { display: none; }
.pill    { padding: 7px 14px; border-radius: 20px; font-size: 13px; font-weight: 600; cursor: pointer; border: 2px solid transparent; transition: all .14s; font-family: 'DM Sans',sans-serif; white-space: nowrap; flex-shrink: 0; }
.pon  { background: var(--navy); color: #fff; }
.poff { background: #fff; color: var(--muted); border-color: var(--border); }

/* Stats */
.sg { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 16px; }
.sc { background: var(--card); border-radius: 12px; padding: 14px; text-align: center; border: 1px solid var(--border); }
.sn { font-family: 'Barlow Condensed',sans-serif; font-size: 34px; font-weight: 800; }
.sl { font-size: 11px; color: var(--muted); text-transform: uppercase; font-weight: 600; letter-spacing: .5px; margin-top: 2px; }

/* Tabs */
.tab-bar { display: flex; background: #fff; border-bottom: 1px solid var(--border); overflow-x: auto; -ms-overflow-style: none; scrollbar-width: none; }
.tab-bar::-webkit-scrollbar { display: none; }
.tab  { padding: 13px 14px; font-size: 12px; font-weight: 600; cursor: pointer; white-space: nowrap; border-bottom: 3px solid transparent; color: var(--muted); font-family: 'DM Sans',sans-serif; transition: all .14s; flex-shrink: 0; }
.ton  { border-bottom-color: var(--red); color: var(--red); }

/* Misc */
.ct      { padding: 18px; }
.stitle  { font-family: 'Barlow Condensed',sans-serif; font-size: 14px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; margin-top: 20px; }
.div     { height: 1px; background: var(--border); margin: 14px 0; }
.emsg    { color: #ef4444; font-size: 13px; margin-top: 6px; }
.tid     { font-family: 'Barlow Condensed',sans-serif; font-size: 26px; font-weight: 800; color: var(--red); }
.pl      { color: var(--blue); text-decoration: none; font-weight: 600; }
.ml      { display: inline-flex; align-items: center; gap: 6px; background: #e8f5e9; color: #2e7d32; padding: 8px 14px; border-radius: 8px; text-decoration: none; font-weight: 600; font-size: 13px; margin-top: 8px; }
.svcs    { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 14px; }
.so      { padding: 10px 4px; border: 2px solid var(--border); border-radius: 10px; text-align: center; cursor: pointer; font-size: 11px; font-weight: 600; color: var(--muted); transition: all .14s; background: #fff; font-family: 'DM Sans',sans-serif; line-height: 1.3; }
.so.on   { border-color: var(--red); background: #fff0f0; color: var(--red); }
.pin-w   { display: flex; justify-content: center; }
.pin-i   { width: 160px; text-align: center; font-size: 28px; letter-spacing: 10px; padding: 12px; }
.ir      { display: flex; justify-content: space-between; align-items: flex-start; padding: 5px 0; border-bottom: 1px solid #f3f4f6; gap: 10px; }
.ik      { font-size: 12px; color: var(--muted); font-weight: 600; white-space: nowrap; }
.iv      { font-size: 13px; font-weight: 500; text-align: right; word-break: break-word; }
.empty   { text-align: center; padding: 48px 20px; color: var(--muted); }
.empty i { font-size: 48px; display: block; margin-bottom: 12px; }
.empty h3{ font-family: 'Barlow Condensed',sans-serif; font-size: 20px; font-weight: 700; color: var(--text); margin-bottom: 6px; }
.empty p { font-size: 13px; line-height: 1.5; }
.bc-wrap { display: flex; align-items: flex-end; gap: 6px; height: 80px; margin-top: 8px; }
.bc-col  { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; }
.bc-bar  { width: 100%; border-radius: 4px 4px 0 0; }
.bc-lbl  { font-size: 9px; color: var(--muted); font-weight: 600; }
.gw      { display: flex; flex-direction: column; align-items: center; margin: 8px 0; }

/* Language screen */
.ls { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; background: var(--navy); padding: 40px 24px; }
.lb { width: 100%; max-width: 280px; padding: 18px; border-radius: 14px; font-size: 18px; font-weight: 700; cursor: pointer; transition: all .17s; font-family: 'DM Sans',sans-serif; margin-bottom: 14px; border: 2px solid transparent; }
.lb:active { transform: scale(.97); }
</style>
</head>

<script>
'use strict';

// ─── SECURE STORAGE ───────────────────────────────
const _CK = 'UnicElev@2024#SecureKey!XY';
function enc(d){try{const s=JSON.stringify(d);let r='';for(let i=0;i<s.length;i++)r+=String.fromCharCode(s.charCodeAt(i)^_CK.charCodeAt(i%_CK.length));return btoa(unescape(encodeURIComponent(r)));}catch(e){return null;}}
function dec(raw){try{const s=decodeURIComponent(escape(atob(raw)));let r='';for(let i=0;i<s.length;i++)r+=String.fromCharCode(s.charCodeAt(i)^_CK.charCodeAt(i%_CK.length));return JSON.parse(r);}catch(e){return null;}}
// In-memory fallback if localStorage is blocked (ACode / private mode / file://)
const _MEM = {};
function lsGet(k,fb){
  try{
    if(typeof localStorage==='undefined') return _MEM[k]||fb;
    const v=localStorage.getItem(k);
    return v?(dec(v)||fb):fb;
  }catch(e){return _MEM[k]||fb;}
}
function lsSet(k,d){
  _MEM[k]=d; // always keep in memory too
  try{
    if(typeof localStorage==='undefined') return;
    const e=enc(d);if(e)localStorage.setItem(k,e);
  }catch(e){}
}

// ─── STORE ────────────────────────────────────────
const STORE = {
  tickets:  lsGet('__ue_t__', []),
  sessions: lsGet('__ue_s__', []),

  addTicket(t)       { this.tickets.unshift(t); lsSet('__ue_t__',this.tickets); },
  updateStatus(id,s) {
    if (!['pending','in-progress','completed'].includes(s)) return;
    const t=this.tickets.find(x=>x.id===id);
    if(t){t.status=s;t.updatedAt=Date.now();lsSet('__ue_t__',this.tickets);}
  },
  addSession(s)      { this.sessions.unshift(s); lsSet('__ue_s__',this.sessions); },
  logoutSess(id)     {
    const s=this.sessions.find(x=>x.id===id);
    if(s&&!s.logoutTime){s.logoutTime=Date.now();lsSet('__ue_s__',this.sessions);}
  },
  nextId() {
    const max=this.tickets.reduce((m,t)=>Math.max(m,parseInt((t.id||'').replace('UE-',''))||0),0);
    return 'UE-'+String(max+1).padStart(5,'0');
  }
};

let SCR     = 'language';

let TECH    = null;   // active tech session

  }

const t = k => (TR[LANG]||TR.en)[k] || k;

// ─── HELPERS ──────────────────────────────────────
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
function ago(ts){if(!ts)return'—';const d=Date.now()-ts;if(d<60000)return'Just now';if(d<3600000)return Math.floor(d/60000)+'m ago';if(d<86400000)return Math.floor(d/3600000)+'h ago';return Math.floor(d/86400000)+'d ago';}
function fmt(ts){if(!ts)return'—';return new Date(ts).toLocaleString('en-IN',{day:'2-digit',month:'short',year:'2-digit',hour:'2-digit',minute:'2-digit'});}
function dur(a,b){const m=Math.floor(((b||Date.now())-a)/60000);if(m<1)return'< 1 min';if(m<60)return m+' min';return Math.floor(m/60)+'h '+(m%60)+'m';}
function si(s){return{pending:['bp','⏳ Pending'],'in-progress':['bi','🔧 In Progress'],completed:['bc','✅ Completed']}[s]||['bp',s];}
function tb(tp){return{'Emergency Repair':'bem','Monthly Service':'bmo','New Installation':'bin'}[tp]||'bp';}
function IR(k,v){return`<div class="ir"><span class="ik">${k}</span><span class="iv">${v}</span></div>`;}
function topbar(title,back){return`<div class="topbar">${back?`<button class="back-btn" id="BK">${t('bk')}</button>`:'<div style="width:64px"></div>'}<span class="topbar-title">${title}</span><div style="width:64px"></div></div>`;}

// ─── ROUTER ───────────────────────────────────────
function go(scr, data={}, push=true){
  if(push) STACK.push({s:SCR,d:{...DATA}});
  SCR=scr; DATA=data;
  stopPoll(); render();
}
function goBack(){
  if(!STACK.length) return;
  const p=STACK.pop(); SCR=p.s; DATA=p.d||{};
  stopPoll(); render();
}

// ─── RENDER ───────────────────────────────────────
function render(){
  document.getElementById('S').innerHTML = build();
  bind();
  if(SCR==='techDashboard')  startTechPoll();
  if(SCR==='adminDashboard') startAdminPoll();
}

// Partial update (no flicker)
function partialTech(){
  const pr=document.getElementById('PR'), tl=document.getElementById('TL');
  if(pr){pr.innerHTML=buildPills(); bindPills();}
  if(tl){tl.innerHTML=buildList();  bindCards();}
}
function partialAdmin(){
  const el=document.getElementById('AC');
  if(el){el.innerHTML=buildAdminTab(DATA.tab||'overview'); bindAdminCt();}
}

function build(){
  if(SCR==='language')       return sLang();
  if(SCR==='role')           return sRole();
  if(SCR==='customerMenu')   return sCust();
  if(SCR==='requestService') return sReq();
  if(SCR==='ticketSuccess')  return sSuccess();
  if(SCR==='trackStatus')    return sTrack();
  if(SCR==='techLogin')      return sTechLogin();

function aAnalytics(){
  const all=STORE.tickets, done=all.filter(x=>x.status==='completed').length;
  const rate=all.length?Math.round((done/all.length)*100):0;
  const types=[{l:'Emergency Repair',c:all.filter(x=>x.type==='Emergency Repair').length,col:'var(--red)'},{l:'Monthly Service',c:all.filter(x=>x.type==='Monthly Service').length,col:'#7c3aed'},{l:'New Installation',c:all.filter(x=>x.type==='New Installation').length,col:'var(--blue)'}];
  const mx=Math.max(...types.map(x=>x.c),1);
  const circ=2*Math.PI*40, dash=(rate/100)*circ;
  return`
  <p class="stitle" style="margin-top:0;">${t('cr')}</p>
  <div class="card"><div class="gw">
    <svg width="120" height="120" viewBox="0 0 100 100">
      <circle cx="50" cy="50" r="40" fill="none" stroke="#e5e7eb" stroke-width="10"/>
      <circle cx="50" cy="50" r="40" fill="none" stroke="var(--green)" stroke-width="10"
        stroke-dasharray="${dash.toFixed(1)} ${circ.toFixed(1)}"
        stroke-dashoffset="${(circ/4).toFixed(1)}"
        stroke-linecap="round" transform="rotate(-90 50 50)"/>
      <text x="50" y="56" text-anchor="middle" font-family="Barlow Condensed" font-size="22" font-weight="800" fill="var(--navy)">${rate}%</text>
    </svg>
    <p style="font-size:13px;color:var(--muted);">${done} of ${all.length} tickets completed</p>
  </div></div>
  <p class="stitle">${t('sd2')}</p>
  <div class="card">${types.map(tp=>`<div style="margin-bottom:12px;"><div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px;"><span style="font-weight:600;">${tp.l}</span><span style="color:var(--muted);">${tp.c}</span></div><div style="background:var(--border);border-radius:4px;height:10px;"><div style="background:${tp.col};height:10px;border-radius:4px;width:${(tp.c/mx)*100}%;"></div></div></div>`).join('')}</div>
  <p class="stitle">${t('ss')}</p>
  <div class="card">
    ${IR('Total Tickets',all.length)}${IR('Pending',all.filter(x=>x.status==='pending').length)}
    ${IR('In Progress',all.filter(x=>x.status==='in-progress').length)}${IR('Completed',done)}
    ${IR('Total Sessions',STORE.sessions.length)}${IR('Active Now',STORE.sessions.filter(s=>!s.logoutTime).length)}
  </div>`;
}

// ─── BIND EVENTS ──────────────────────────────────
function bind(){
  const $=id=>document.getElementById(id);
  const on=(id,ev,fn)=>{const e=$(id);if(e)e.addEventListener(ev,fn);};

  on('BK','click',goBack);

  // Language
  on('LEN','click',()=>{LANG='en';STACK=[];go('role',{},false);});
  on('LTE','click',()=>{LANG='te';STACK=[];go('role',{},false);});

  // Role
  on('RC','click',()=>go('customerMenu'));
  on('RT','click',()=>go('techLogin'));
  on('RA','click',()=>go('adminLogin'));

  // Customer menu
  on('CRS','click',()=>go('requestService'));
  on('CTS','click',()=>go('trackStatus'));

  // Service type selector
  document.querySelectorAll('[data-sv]').forEach(b=>{
    b.addEventListener('click',()=>{
      DATA.serviceType=b.dataset.sv;
      document.querySelectorAll('[data-sv]').forEach(x=>x.classList.toggle('on',x.dataset.sv===DATA.serviceType));
    });
  });

  // Location
  on('LC','click',()=>{
    const m=$('LM');
    if(!navigator.geolocation){if(m)m.innerHTML=`<span style="color:#ef4444;">${t('ln')}</span>`;return;}
    if(m)m.innerHTML=`<span style="color:var(--muted);">${t('lf')}</span>`;
    navigator.geolocation.getCurrentPosition(p=>{
      DATA.location={lat:p.coords.latitude,lng:p.coords.longitude};
      const b=$('LC');
      if(b)b.innerHTML=`<span style="color:var(--green)">✅</span> ${t('lc')} (${p.coords.latitude.toFixed(4)}, ${p.coords.longitude.toFixed(4)})`;
      if(m)m.innerHTML='';
    },()=>{if(m)m.innerHTML=`<span style="color:#ef4444;">${t('ld')}</span>`;});
  });

  // Submit request
  on('SB','click',()=>{
    const nm=($('NM')?.value||'').trim();
    const ph=($('PH')?.value||'').replace(/\D/g,'');
    const bd=($('BD')?.value||'').trim();
    const is=($('IS')?.value||'').trim();
    const fe=$('FE');
    if(!nm||!ph||!bd||!DATA.serviceType){if(fe)fe.textContent=t('erq');return;}
    if(ph.length<10){if(fe)fe.textContent=t('eph');return;}
    const tk={id:STORE.nextId(),type:DATA.serviceType,name:nm,phone:ph,building:bd,issue:is||'No description provided',status:'pending',location:DATA.location||null,createdAt:Date.now(),updatedAt:Date.now()};
    STORE.addTicket(tk);
    go('ticketSuccess',{ticket:tk});
  });

  // Ticket success
  on('GT','click',()=>{const id=DATA.ticket?.id;go('trackStatus',{query:id,result:STORE.tickets.find(x=>x.id===id),searched:true});});
  on('DN','click',()=>{STACK=[];go('language',{},false);});

  // Track
  on('SBT','click',()=>{
    const q=($('SQ')?.value||'').trim();
    if(!q)return;
    const res=STORE.tickets.find(x=>x.id===q||x.phone===q);
    DATA={query:q,result:res,searched:true};render();
  });

  // Tech login
  on('TLB','click',()=>{
    const nm=($('TN')?.value||'').trim(), pin=($('TP')?.value||'').trim(), e=$('TE');
    if(!nm){if(e)e.textContent=t('nr');return;}
    if(pin!=='1111'){if(e)e.textContent=t('wp');return;}
    const sess={id:'S'+Date.now(),techName:nm,loginTime:Date.now(),logoutTime:null};
    TECH=sess; STORE.addSession(sess);
    STACK=[]; go('techDashboard',{filter:'ALL'},false);
  });

  // Tech dashboard
  on('TLO','click',()=>{
    if(TECH){STORE.logoutSess(TECH.id);TECH=null;}
    stopPoll(); STACK=[]; go('language',{},false);
  });
  bindPills(); bindCards();

  // Job detail
  on('MIP','click',()=>{if(DATA.ticket){STORE.updateStatus(DATA.ticket.id,'in-progress');DATA.ticket.status='in-progress';render();}});
  on('MCP','click',()=>{if(DATA.ticket){STORE.updateStatus(DATA.ticket.id,'completed');DATA.ticket.status='completed';render();}});

  // Admin login
  on('ALB','click',()=>{
    const nm=($('AN')?.value||'').trim(), pin=($('AP')?.value||'').trim(), e=$('AE');
    if(!nm){if(e)e.textContent=t('nr');return;}
    if(pin!=='2222'){if(e)e.textContent=t('wp');return;}
    ADMIN={name:nm,loginTime:Date.now()};
    STACK=[]; go('adminDashboard',{tab:'overview'},false);
  });

  // Admin tabs
  document.querySelectorAll('[data-at]').forEach(tab=>{
    tab.addEventListener('click',()=>{DATA.tab=tab.dataset.at;render();});
  });
  on('ALO','click',()=>{ADMIN=null;stopPoll();STACK=[];go('language',{},false);});
  bindAdminCt();
}
function bindPills(){
  document.querySelectorAll('[data-pf]').forEach(b=>{
    b.addEventListener('click',()=>{
      DATA.filter=b.dataset.pf;
      const pr=document.getElementById('PR'), tl=document.getElementById('TL');
      if(pr){pr.innerHTML=buildPills();bindPills();}
      if(tl){tl.innerHTML=buildList();bindCards();}
    });
  });
}
function bindCards(){
  document.querySelectorAll('[data-tid]').forEach(c=>{
    c.addEventListener('click',()=>{
      const tk=STORE.tickets.find(x=>x.id===c.dataset.tid);
      if(tk)go('jobDetail',{ticket:tk});
    });
  });
}
function bindAdminCt(){
  document.querySelectorAll('[data-as]').forEach(s=>{
    s.addEventListener('change',()=>STORE.updateStatus(s.dataset.as,s.value));
  });
}

// ─── SMART POLLING (no flicker) ───────────────────
function startTechPoll(){
  stopPoll();
  POLL=setInterval(()=>{if(SCR==='techDashboard')partialTech();},1500);
}
function startAdminPoll(){
  stopPoll();
  POLL=setInterval(()=>{if(SCR==='adminDashboard')partialAdmin();},2000);
}
function stopPoll(){if(POLL){clearInterval(POLL);POLL=null;}}

// ─── BOOT ─────────────────────────────────────────
// Use DOMContentLoaded to guarantee DOM is ready in ALL environments
// (ACode, file://, Netlify, Chrome, Firefox, Android WebView)
function boot() {
  try {
    const el = document.getElementById('S');
    if (!el) { setTimeout(boot, 50); return; } // retry if DOM not ready yet
    render();
  } catch(e) {
    // If anything fails, show error so user knows what happened
    document.body.innerHTML = '<div style="padding:30px;font-family:Arial;color:#8B0000;text-align:center;"><h2>Loading Error</h2><p style="margin-top:10px;font-size:14px;">'+e.message+'</p><button onclick="location.reload()" style="margin-top:20px;padding:12px 24px;background:#8B0000;color:white;border:none;border-radius:8px;font-size:16px;cursor:pointer;">Retry</button></div>';
  }
}
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', boot);
} else {
  boot(); // DOM already ready
}
</script>
</body>
</html>
